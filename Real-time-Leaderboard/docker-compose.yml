version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Your_strong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserverdata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: API/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=RealTimeLeaderboard;User Id=sa;Password=Your_strong!Passw0rd;TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
      - Jwt__Key=your_super_secure_jwt_key_that_is_at_least_256_bits_long_12345
      - Jwt__Issuer=http://localhost:5000
      - Jwt__Audience=http://localhost:5000
      - ASPNETCORE_ENVIRONMENT=Production
      - SQL_SERVER_HOST=sqlserver
      - SQL_SERVER_PORT=1433
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "5000:80"
    depends_on:
      - sqlserver
      - redis
    restart: unless-stopped

  ui:
    build:
      context: UI
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlserverdata:
